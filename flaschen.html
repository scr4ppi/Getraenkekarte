<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Roonburg Flaschen</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #050505;
      --card: rgba(0, 0, 0, 0.64);
      --border: rgba(255, 255, 255, 0.14);
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.68);
      --accent: #ff3333;
      --radius-xl: 22px;
      --shadow: 0 16px 38px rgba(0, 0, 0, 0.46);
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at 20% 8%, rgba(255, 51, 51, 0.16), transparent 28%),
        radial-gradient(circle at 82% 12%, rgba(255, 190, 80, 0.1), transparent 26%),
        linear-gradient(180deg, #080808, #030303 72%);
      color: var(--text);
    }

    body {
      overflow-x: hidden;
    }

    .page {
      width: min(100%, 760px);
      margin: 0 auto;
      padding: 22px 14px 34px;
    }

    .hero {
      text-align: center;
      padding-top: 10px;
      margin-bottom: 18px;
    }

    .logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 12px;
    }

    .logo-mark {
      width: 112px;
      height: 112px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: rgba(0, 0, 0, 0.72);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      padding: 12px;
      backdrop-filter: blur(10px);
    }

    .logo-mark img {
      width: 100%;
      height: auto;
      display: block;
    }

    .kicker {
      margin: 0 0 7px;
      font-size: 0.75rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 800;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.35rem, 13vw, 4rem);
      line-height: 0.9;
      text-transform: uppercase;
      letter-spacing: -0.07em;
    }

    .intro {
      max-width: 460px;
      margin: 12px auto 0;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.45;
    }

    .top-actions {
      margin: 18px 0 14px;
    }

    .back-btn {
      display: block;
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 999px;
      padding: 14px 18px;
      background: rgba(0, 0, 0, 0.58);
      color: #fff;
      font-size: 0.92rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      text-decoration: none;
      text-align: center;
      box-shadow: var(--shadow);
    }

    .filters {
      display: flex;
      gap: 9px;
      overflow-x: auto;
      padding: 4px 0 14px;
      margin-bottom: 6px;
      scrollbar-width: none;
    }

    .filters::-webkit-scrollbar {
      display: none;
    }

    .filter-btn {
      flex: 0 0 auto;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 10px 14px;
      background: rgba(0, 0, 0, 0.56);
      color: var(--text);
      font-size: 0.78rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      cursor: pointer;
    }

    .filter-btn.active {
      background: var(--accent);
      border-color: rgba(255, 255, 255, 0.25);
    }

    .list {
      display: grid;
      gap: 12px;
    }

    .bottle-card {
      display: flex;
      align-items: stretch;
      gap: 14px;
      min-height: 132px;
      border-radius: var(--radius-xl);
      background: var(--card);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      overflow: hidden;
    }

    .bottle-image {
      width: 104px;
      flex: 0 0 104px;
      min-height: 132px;
      background: rgba(255,255,255,0.05);
      display: block;
      object-fit: cover;
    }

    .bottle-body {
      flex: 1;
      min-width: 0;
      padding: 16px 14px 14px 0;
      display: grid;
      align-content: center;
      gap: 10px;
    }

    .bottle-title-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .bottle-name {
      margin: 0;
      min-width: 0;
      font-size: 1.08rem;
      line-height: 1.08;
      text-transform: uppercase;
      letter-spacing: -0.035em;
      overflow-wrap: anywhere;
    }

    .bottle-price {
      flex: 0 0 auto;
      font-weight: 900;
      color: var(--accent);
      font-size: 1rem;
      white-space: nowrap;
    }

    .bottle-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      color: var(--muted);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 800;
    }

    .pill {
      border: 1px solid rgba(255,255,255,0.11);
      border-radius: 999px;
      padding: 6px 9px;
      background: rgba(255,255,255,0.055);
    }

    @media (max-width: 430px) {
      .logo-mark {
        width: 104px;
        height: 104px;
      }

      .bottle-image {
        width: 88px;
        flex-basis: 88px;
      }

      .bottle-body {
        padding-right: 12px;
      }

      .bottle-name {
        font-size: 1rem;
      }
    }

    @media (min-width: 720px) {
      .list {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="hero">
      <div class="logo-wrap">
        <div class="logo-mark">

      <p class="kicker">Roonburg</p>
      <h1>Flaschen</h1>
      <p class="intro">Flaschen, Fässchen, Champagner und Softdrinks im gleichen Stil wie deine Longdrink-Seite — jeweils mit eigenem Bild.</p>
    </section>

    <div class="top-actions">
      <a class="back-btn" href="index.html">Zurück zur Auswahl</a>
    </div>

    <nav class="filters" aria-label="Flaschen Kategorien">
      <button class="filter-btn active" type="button" data-category="ALL">Alle</button>
      <button class="filter-btn" type="button" data-category="VODKA">Vodka</button>
      <button class="filter-btn" type="button" data-category="RUM">Rum</button>

    </nav>

    <section class="list" id="bottleList" aria-label="Flaschenliste"></section>
  </main>

    const filterButtons = document.querySelectorAll(".filter-btn");

    let currentCategory = "ALL";

    function renderBottles() {
      list.innerHTML = "";

      const visibleBottles = currentCategory === "ALL"
        ? bottles
        : bottles.filter(item => item.category === currentCategory);

      visibleBottles.forEach(item => {
        const card = document.createElement("article");
        card.className = "bottle-card";
        card.dataset.category = item.category;

        card.innerHTML = `
          <img class="bottle-image" src="${item.img}" alt="${item.name}" loading="lazy" decoding="async" />
          <div class="bottle-body">
            <div class="bottle-title-row">
              <h3 class="bottle-name">${item.name}</h3>
              <div class="bottle-price">${item.price}</div>
            </div>
            <div class="bottle-meta">
              <span class="pill">${item.category}</span>
              <span class="pill">${item.liter} Liter</span>
            </div>
          </div>
        `;

        list.appendChild(card);
      });
    }

    filterButtons.forEach(button => {
      button.addEventListener("click", () => {
        filterButtons.forEach(btn => btn.classList.remove("active"));
        button.classList.add("active");

        currentCategory = button.dataset.category;
        renderBottles();
      });
    });

    renderBottles();
