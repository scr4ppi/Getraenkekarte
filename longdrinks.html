<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Roonburg Longdrinks</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #050505;
      --card: rgba(0, 0, 0, 0.62);
      --border: rgba(255, 255, 255, 0.13);
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.72);
      --accent: #ff3333;
      --accent-soft: rgba(255, 51, 51, 0.22);
      --yellow: #ffd166;
      --radius-xl: 28px;
      --radius-lg: 22px;
      --shadow: 0 16px 38px rgba(0, 0, 0, 0.46);
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(0, 0, 0, 0.76), rgba(0, 0, 0, 0.9)),
        url("https://images.unsplash.com/photo-1578736641330-3155e606cd40?auto=format&fit=crop&w=1400&q=80");
      background-size: cover;
      background-position: center;
      z-index: -3;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 18% 12%, rgba(255, 51, 51, 0.22), transparent 30%),
        radial-gradient(circle at 86% 20%, rgba(255, 200, 80, 0.12), transparent 28%),
        radial-gradient(circle at 50% 92%, rgba(255, 51, 140, 0.16), transparent 38%);
      z-index: -2;
      pointer-events: none;
    }

    .page {
      width: min(100%, 760px);
      margin: 0 auto;
      padding: 18px 14px 34px;
    }

    .hero {
      text-align: center;
      padding-top: 8px;
      margin-bottom: 18px;
    }

    .logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 12px;
    }

    .logo-mark {
      width: 112px;
      height: 112px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: rgba(0, 0, 0, 0.72);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      padding: 12px;
      backdrop-filter: blur(10px);
    }

    .logo-mark img {
      width: 100%;
      height: auto;
      display: block;
    }

    .kicker {
      margin: 0 0 7px;
      font-size: 0.75rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 800;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.35rem, 13vw, 4rem);
      line-height: 0.9;
      text-transform: uppercase;
      letter-spacing: -0.07em;
    }

    .intro {
      margin: 12px auto 0;
      max-width: 390px;
      color: var(--muted);
      font-size: 0.96rem;
      line-height: 1.45;
    }

    .top-actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin: 18px 0 14px;
    }

    .random-btn,
    .back-btn {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 999px;
      padding: 14px 18px;
      font-size: 0.92rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #fff;
      text-decoration: none;
      text-align: center;
      cursor: pointer;
      box-shadow: var(--shadow);
    }

    .random-btn {
      background:
        linear-gradient(135deg, rgba(255, 51, 51, 0.95), rgba(180, 0, 60, 0.95));
    }

    .back-btn {
      background: rgba(0, 0, 0, 0.58);
    }

    .filters {
      display: flex;
      gap: 9px;
      overflow-x: auto;
      padding: 4px 0 14px;
      margin-bottom: 6px;
      scrollbar-width: none;
    }

    .filters::-webkit-scrollbar {
      display: none;
    }

    .filter-btn {
      flex: 0 0 auto;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 10px 14px;
      background: rgba(0, 0, 0, 0.56);
      color: var(--text);
      font-size: 0.78rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      cursor: pointer;
    }

    .filter-btn.active {
      background: var(--accent);
      border-color: rgba(255, 255, 255, 0.25);
    }

    .list {
      display: grid;
      gap: 12px;
    }

    .card {
      border-radius: var(--radius-xl);
      overflow: hidden;
      background: var(--card);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .card-toggle {
      width: 100%;
      border: 0;
      padding: 0;
      display: flex;
      align-items: stretch;
      text-align: left;
      color: var(--text);
      background: transparent;
      cursor: pointer;
    }

    .drink-image {
      width: 96px;
      min-height: 124px;
      flex: 0 0 96px;
      background:
        radial-gradient(circle at 40% 25%, rgba(255, 255, 255, 0.45), transparent 18%),
        linear-gradient(145deg, rgba(255, 51, 51, 0.58), rgba(255, 180, 60, 0.14)),
        rgba(255, 255, 255, 0.06);
      display: grid;
      place-items: center;
      position: relative;
      overflow: hidden;
    }

    .drink-image::after {
      content: "";
      width: 36px;
      height: 78px;
      border: 3px solid rgba(255, 255, 255, 0.78);
      border-top-width: 5px;
      border-radius: 9px 9px 15px 15px;
      background: linear-gradient(to top, rgba(255, 51, 51, 0.54), rgba(255, 255, 255, 0.06));
      box-shadow: 0 0 24px rgba(255, 51, 51, 0.32);
    }

    .card-body {
      flex: 1;
      padding: 16px 16px 14px;
      min-width: 0;
    }

    .card-title-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 6px;
    }

    .card-title {
      margin: 0;
      font-size: 1.18rem;
      line-height: 1.05;
      text-transform: uppercase;
      letter-spacing: -0.04em;
    }

    .price {
      flex: 0 0 auto;
      font-weight: 900;
      color: var(--accent);
      font-size: 1rem;
    }

    .card-note {
      margin: 0;
      color: var(--muted);
      font-size: 0.87rem;
      line-height: 1.35;
    }

    .card-meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
      color: rgba(255, 255, 255, 0.76);
      font-size: 0.78rem;
    }

    .stars {
      color: var(--yellow);
      letter-spacing: 0.04em;
    }

    .card-panel {
      display: none;
      padding: 0 16px 16px 112px;
    }

    .card.open .card-panel {
      display: block;
    }

    .panel-box {
      border-radius: var(--radius-lg);
      background: rgba(255, 255, 255, 0.055);
      border: 1px solid rgba(255, 255, 255, 0.09);
      padding: 14px;
    }

    .panel-box h4 {
      margin: 0 0 8px;
      font-size: 0.82rem;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .ingredients {
      margin: 0 0 12px;
      padding-left: 18px;
      color: rgba(255, 255, 255, 0.86);
      font-size: 0.9rem;
      line-height: 1.45;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .chip {
      border-radius: 999px;
      padding: 6px 9px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.82);
      font-size: 0.74rem;
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 18px;
      background: rgba(0, 0, 0, 0.78);
      z-index: 50;
    }

    .modal.show {
      display: grid;
    }

    .modal-card {
      width: min(100%, 420px);
      border-radius: 30px;
      padding: 22px;
      background:
        linear-gradient(145deg, rgba(80, 0, 0, 0.82), rgba(0, 0, 0, 0.92));
      border: 1px solid rgba(255, 255, 255, 0.16);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.72);
      text-align: center;
    }

    .modal-kicker {
      margin: 0 0 8px;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 0.76rem;
      font-weight: 900;
    }

    .modal-title {
      margin: 0;
      font-size: 2rem;
      text-transform: uppercase;
      letter-spacing: -0.06em;
    }

    .modal-text {
      margin: 12px auto 18px;
      color: var(--muted);
      line-height: 1.45;
    }

    .modal-actions {
      display: grid;
      gap: 10px;
    }

    .modal-btn {
      border: 0;
      border-radius: 999px;
      padding: 13px 16px;
      color: #fff;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      cursor: pointer;
    }

    .modal-btn.primary {
      background: var(--accent);
    }

    .modal-btn.secondary {
      background: rgba(255, 255, 255, 0.12);
    }

    @media (max-width: 430px) {
      .logo-mark {
        width: 104px;
        height: 104px;
      }

      .card-panel {
        padding-left: 16px;
      }

      .drink-image {
        width: 86px;
        flex-basis: 86px;
      }

      .card-title {
        font-size: 1.05rem;
      }
    }

    @media (min-width: 720px) {
      .top-actions {
        grid-template-columns: 1fr 1fr;
      }

      .list {
        grid-template-columns: repeat(2, 1fr);
      }

      .card-toggle {
        min-height: 152px;
      }

      .card-panel {
        padding-left: 16px;
      }
    }
  </style>
</head>

<body>

        card.innerHTML = `
          <button class="card-toggle" type="button" aria-expanded="false">
            <div class="drink-image" aria-hidden="true"></div>

            <div class="card-body">
              <div class="card-title-row">
                <h3 class="card-title">${drink.name}</h3>
                <div class="price">${drink.price}</div>
              </div>

              <p class="card-note">${drink.note}</p>

              <div class="card-meta">
                <span>Alkohol: <span class="stars">${stars(drink.alcohol)}</span></span>
                <span>Fruchtig: <span class="stars">${stars(drink.fruity)}</span></span>
              </div>
            </div>
          </button>

          <div class="card-panel">
            <div class="panel-box">
              <h4>Zutaten</h4>
              <ul class="ingredients">
                ${drink.ingredients.map(item => `<li>${item}</li>`).join("")}
              </ul>

              <h4>Inhaltsstoffe</h4>
              <div class="chips">
                ${drink.contents.map(item => `<span class="chip">${item}</span>`).join("")}
              </div>
            </div>
          </div>
        `;

        const toggle = card.querySelector(".card-toggle");

        toggle.addEventListener("click", () => {
          const isOpen = card.classList.toggle("open");
          toggle.setAttribute("aria-expanded", isOpen ? "true" : "false");
        });

        list.appendChild(card);
      });
    }

    filterButtons.forEach(button => {
      button.addEventListener("click", () => {
        filterButtons.forEach(btn => btn.classList.remove("active"));
        button.classList.add("active");

        currentCategory = button.dataset.category;
        renderDrinks();
      });
    });

    randomBtn.addEventListener("click", () => {
      const pool = currentCategory === "ALL"
        ? longdrinks
        : longdrinks.filter(drink => drink.category === currentCategory);

      selectedRandomDrink = pool[Math.floor(Math.random() * pool.length)];

      modalTitle.textContent = selectedRandomDrink.name;
      modalText.textContent = selectedRandomDrink.note;
      modal.classList.add("show");
      modal.setAttribute("aria-hidden", "false");
    });

    modalClose.addEventListener("click", closeModal);

    modal.addEventListener("click", event => {
      if (event.target === modal) {
        closeModal();
      }
    });

    modalOpenDrink.addEventListener("click", () => {
      if (!selectedRandomDrink) return;

      closeModal();

      currentCategory = "ALL";
      filterButtons.forEach(btn => {
        btn.classList.toggle("active", btn.dataset.category === "ALL");
      });

      renderDrinks();

      setTimeout(() => {
        const card = document.querySelector(`[data-id="${selectedRandomDrink.id}"]`);
        if (!card) return;

        card.scrollIntoView({ behavior: "smooth", block: "center" });
        card.classList.add("open");

        const toggle = card.querySelector(".card-toggle");
        if (toggle) {
          toggle.setAttribute("aria-expanded", "true");
        }
      }, 50);
    });

    function closeModal() {
      modal.classList.remove("show");
      modal.setAttribute("aria-hidden", "true");
    }

    renderDrinks();
  </script>
</body>
</html>
