<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roonburg Biere</title>
  <style>
    :root {
      --bg: #050505;
      --card: rgba(35, 35, 35, 0.85);
      --border: rgba(255, 255, 255, 0.08);
      --text: #ffffff;
      --accent: #ff3333;
      --radius-xl: 22px;
      --shadow: 0 16px 38px rgba(0, 0, 0, 0.46);
    }
    body { margin: 0; padding: 20px 10px; font-family: Arial, sans-serif; background: #000; color: #fff; }
    .page { width: min(100%, 760px); margin: 0 auto; }
    
    /* Karten-Design wie in deiner Longdrink-Vorlage */
    .list { display: grid; gap: 12px; grid-template-columns: 1fr; }
    @media (min-width: 600px) { .list { grid-template-columns: repeat(2, 1fr); } }

    .card {
      display: flex;
      align-items: center;
      height: 120px;
      background: var(--card);
      border-radius: var(--radius-xl);
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .card-img {
      width: 90px;
      height: 100%;
      background: rgba(255,255,255,0.05);
      border-right: 1px solid var(--border);
      padding: 10px;
      object-fit: contain;
    }
    .card-body {
      flex: 1;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
    }
    .card-title {
      font-size: 1rem;
      font-weight: 900;
      text-transform: uppercase;
      line-height: 1.1;
      margin: 0;
      max-width: 60%;
    }
    .card-price {
      background: rgba(255,255,255,0.15);
      padding: 6px 12px;
      border-radius: 10px;
      font-weight: 900;
      font-size: 0.9rem;
    }
    .back-btn { display: block; text-align: center; background: var(--accent); color: white; padding: 15px; border-radius: 999px; text-decoration: none; font-weight: 900; margin-bottom: 20px; text-transform: uppercase; }
  </style>
</head>
<body>
  <main class="page">
    <a class="back-btn" href="index.html">Zurück zur Auswahl</a>
    <section class="list" id="beerList"></section>
  </main>

  <script>
    const beers = [
      { name: "Hellers Kölsch (Fass)", price: "105 €", img: "Beers/hellers.webp" },
      { name: "Beck's", price: "4,00 €", img: "Flaschenbier/becks.webp" },
      { name: "Heineken", price: "3,00 €", img: "Flaschenbier/Heineken.webp" },
      { name: "Super Bock", price: "3,50 €", img: "Flaschenbier/superbock.webp" },
      { name: "Franziskaner Hefe-Weizenbier", price: "6,00 €", img: "Flaschenbier/franziskaner.webp" },
      { name: "Desperados", price: "4,00 €", img: "Flaschenbier/Desperados.webp" },
      { name: "Corona Extra", price: "4,00 €", img: "Flaschenbier/corona.webp" },
      { name: "Salitos Ice / Pink / Mojito", price: "4,00 €", img: "Flaschenbier/salitos.webp" },
      { name: "Gösser Naturradler", price: "3,50 €", img: "Flaschenbier/goesser.webp" },
      { name: "Heineken 0.0", price: "4,50 €", img: "Flaschenbier/heineken00.webp" }
    ];

    const list = document.getElementById("beerList");
    beers.forEach(b => {
      const div = document.createElement("div");
      div.className = "card";
      div.innerHTML = `
        <img class="card-img" src="${b.img}" alt="${b.name}">
        <div class="card-body">
          <h3 class="card-title">${b.name}</h3>
          <div class="card-price">${b.price}</div>
        </div>
      `;
      list.appendChild(div);
    });
  </script>
</body>
</html>
