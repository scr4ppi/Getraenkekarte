<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roonburg Biere</title>
  <style>
    :root {
      --card: rgba(0, 0, 0, 0.65);
      --border: rgba(255, 255, 255, 0.15);
      --text: #ffffff;
      --accent: #ff003c;
      --radius-xl: 28px;
      --shadow: 0 16px 38px rgba(0, 0, 0, 0.6);
    }

    body {
      margin: 0; padding: 20px; font-family: 'Segoe UI', sans-serif;
      background: #050505; color: #fff;
      background: linear-gradient(to bottom, rgba(5, 5, 5, 0.8), rgba(0, 0, 0, 1));
    }

    .page { width: min(100%, 760px); margin: 0 auto; }
    h1 { text-align: center; text-transform: uppercase; font-size: 3rem; margin-bottom: 30px; }

    /* Zurück-Button im originalen Neon-Stil */
    .back-btn {
      display: block; width: 100%; border-radius: 999px; padding: 16px; margin-bottom: 30px;
      background: rgba(25, 25, 25, 0.8); border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff; text-align: center; text-transform: uppercase; font-weight: 900;
      text-decoration: none; backdrop-filter: blur(10px);
    }

    /* Das neue Raster-Layout */
    .list { display: grid; gap: 14px; grid-template-columns: 1fr; }
    @media (min-width: 600px) { .list { grid-template-columns: 1fr 1fr; } }

    /* Die Karten im originalen Shot-Design */
    .card {
      display: flex; align-items: center; height: 120px;
      border-radius: var(--radius-xl); background: var(--card);
      border: 1px solid var(--border); box-shadow: var(--shadow);
      backdrop-filter: blur(12px); overflow: hidden;
    }
    .drink-image {
      width: 100px; height: 100%; flex: 0 0 100px;
      object-fit: contain; background: rgba(255, 255, 255, 0.05);
      border-right: 1px solid var(--border); padding: 10px;
    }
    .card-body {
      flex: 1; padding: 0 20px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .card-title { font-size: 1.1rem; font-weight: 800; text-transform: uppercase; margin: 0; }
    .price {
      font-weight: 900; color: #fff; font-size: 1rem;
      background: rgba(255,255,255,0.15); padding: 6px 12px; border-radius: 12px;
    }
  </style>
</head>
<body>
  <main class="page">
    <h1>Biere</h1>
    <a class="back-btn" href="index.html">Zurück zur Auswahl</a>
    <section class="list" id="beerList"></section>
  </main>

  <script>
    const beers = [
      { name: "Hellers Kölsch (Gezapft)", price: "3 €", img: "Beers/hellers.webp" },
      { name: "Beck's", price: "4,00 €", img: "Flaschenbier/becks.webp" },
      { name: "Heineken", price: "3 €", img: "Flaschenbier/Heineken.webp" },
      { name: "Super Bock", price: "3,50 €", img: "Flaschenbier/superbock.webp" },
      { name: "Franziskaner Weizen", price: "6 €", img: "Flaschenbier/franziskaner.webp" },
      { name: "Desperados", price: "4,00 €", img: "Flaschenbier/Desperados.webp" },
      { name: "Corona Extra", price: "4,00 €", img: "Flaschenbier/corona.webp" },
      { name: "Salitos Ice / Pink / Mojito", price: "4,00 €", img: "Flaschenbier/salitos.webp" },
      { name: "Gösser Naturradler", price: "3,50 €", img: "Flaschenbier/goesser.webp" },
      { name: "Heineken 0.0", price: "4,50 €", img: "Flaschenbier/heineken00.webp" }
    ];

    const list = document.getElementById("beerList");
    beers.forEach(b => {
      const card = document.createElement("article");
      card.className = "card";
      card.innerHTML = `
        <img class="drink-image" src="${b.img}" alt="${b.name}">
        <div class="card-body">
          <h3 class="card-title">${b.name}</h3>
          <div class="price">${b.price}</div>
        </div>
      `;
      list.appendChild(card);
    });
  </script>
</body>
</html>
